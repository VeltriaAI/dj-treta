<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ Treta</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-dark: #08080c;
    --bg: #0c0c12;
    --bg-grad: linear-gradient(145deg, #0e0e16 0%, #08080e 50%, #0a0a14 100%);
    --surface: rgba(16, 16, 24, 0.9);
    --surface2: rgba(22, 22, 32, 0.8);
    --surface-hover: rgba(28, 28, 40, 0.9);
    --border: rgba(255, 255, 255, 0.04);
    --border-light: rgba(255, 255, 255, 0.07);
    --text: #d0d0d8;
    --text-bright: #eeeef2;
    --text-dim: #555568;
    --text-muted: #3a3a4a;

    --cyan: #00d4ff;
    --cyan-mid: #00a8d6;
    --cyan-dark: #0080a0;
    --cyan-dim: rgba(0, 212, 255, 0.08);
    --cyan-glow: rgba(0, 212, 255, 0.25);
    --cyan-glow-strong: rgba(0, 212, 255, 0.5);

    --magenta: #ff2d7b;
    --magenta-mid: #d42565;
    --magenta-dark: #a01e50;
    --magenta-dim: rgba(255, 45, 123, 0.08);
    --magenta-glow: rgba(255, 45, 123, 0.25);
    --magenta-glow-strong: rgba(255, 45, 123, 0.5);

    --green: #00e676;
    --green-dim: rgba(0, 230, 118, 0.12);
    --purple: #7b2ff7;
    --purple-glow: rgba(123, 47, 247, 0.3);
  }

  body {
    background: var(--bg-grad);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .mono {
    font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
  }

  /* ── Header ─────────────────────────────────────────── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 24px;
    background: linear-gradient(180deg, rgba(18,18,28,0.95) 0%, rgba(12,12,18,0.95) 100%);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    height: 48px;
    backdrop-filter: blur(20px);
  }

  .logo {
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 5px;
    background: linear-gradient(135deg, var(--cyan), #6366f1, var(--magenta));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
    position: relative;
  }
  .logo::after {
    content: 'DJ TRETA';
    position: absolute;
    left: 0;
    top: 0;
    background: linear-gradient(135deg, var(--cyan), #6366f1, var(--magenta));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: blur(8px);
    opacity: 0.4;
    pointer-events: none;
  }

  .master-section {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .live-badge {
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 2px;
    padding: 4px 12px;
    border-radius: 4px;
    background: rgba(30,30,40,0.6);
    color: var(--text-muted);
    border: 1px solid rgba(255,255,255,0.05);
    transition: all 0.4s ease;
  }
  .live-badge.on {
    background: var(--green-dim);
    color: var(--green);
    border-color: rgba(0, 230, 118, 0.25);
    box-shadow: 0 0 12px rgba(0, 230, 118, 0.15), inset 0 0 12px rgba(0, 230, 118, 0.05);
    animation: pulse-live 2.5s ease-in-out infinite;
  }
  @keyframes pulse-live {
    0%, 100% { opacity: 1; box-shadow: 0 0 12px rgba(0, 230, 118, 0.15); }
    50% { opacity: 0.7; box-shadow: 0 0 20px rgba(0, 230, 118, 0.25); }
  }

  .master-vol {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .master-vol label {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
  }
  .master-slider {
    width: 90px;
  }

  /* ── Stacked Waveform View (10s zoomed beat-sync) ───── */
  .stacked-waveforms {
    flex-shrink: 0;
    background: #0e0e14;
    border-bottom: 1px solid var(--border);
    display: none;
    position: relative;
  }
  .stacked-waveforms.visible { display: block; }

  .stacked-wf-row {
    position: relative;
    height: 40px;
    overflow: hidden;
  }
  .stacked-wf-row + .stacked-wf-row {
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .stacked-wf-row canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  .stacked-wf-label {
    position: absolute;
    left: 6px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 2px;
    opacity: 0.5;
    z-index: 2;
    pointer-events: none;
  }
  .stacked-wf-row[data-deck="1"] .stacked-wf-label { color: var(--cyan); }
  .stacked-wf-row[data-deck="2"] .stacked-wf-label { color: var(--magenta); }

  .stacked-wf-center-line {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 50%;
    width: 2px;
    transform: translateX(-50%);
    background: rgba(255, 255, 255, 0.9);
    box-shadow: 0 0 6px rgba(255, 255, 255, 0.5), 0 0 12px rgba(255, 255, 255, 0.2);
    z-index: 5;
    pointer-events: none;
  }

  /* ── BPM Sync Controls ──────────────────────────────── */
  .bpm-sync-controls {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-left: 6px;
  }
  .bpm-sync-controls button {
    font-family: inherit;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.5px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s ease;
    border-radius: 3px;
    line-height: 1;
  }
  .bpm-nudge-btn {
    width: 18px;
    height: 18px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .bpm-nudge-btn:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.2);
    color: var(--text);
  }
  .bpm-sync-btn {
    padding: 2px 6px;
    height: 18px;
  }
  .deck[data-deck="1"] .bpm-sync-btn {
    color: var(--cyan);
    border-color: rgba(0, 212, 255, 0.2);
  }
  .deck[data-deck="1"] .bpm-sync-btn:hover {
    background: rgba(0, 212, 255, 0.12);
    border-color: var(--cyan);
    box-shadow: 0 0 8px rgba(0, 212, 255, 0.15);
  }
  .deck[data-deck="2"] .bpm-sync-btn {
    color: var(--magenta);
    border-color: rgba(255, 45, 123, 0.2);
  }
  .deck[data-deck="2"] .bpm-sync-btn:hover {
    background: rgba(255, 45, 123, 0.12);
    border-color: var(--magenta);
    box-shadow: 0 0 8px rgba(255, 45, 123, 0.15);
  }

  /* ── Decks Area ─────────────────────────────────────── */
  .decks-area {
    display: grid;
    grid-template-columns: 1fr 100px 1fr;
    flex: 1;
    min-height: 0;
    padding: 12px 16px;
    gap: 12px;
  }

  /* ── Deck ───────────────────────────────────────────── */
  .deck {
    background: linear-gradient(180deg, rgba(16,16,26,0.9) 0%, rgba(12,12,20,0.95) 100%);
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: border-color 0.5s ease, box-shadow 0.5s ease;
    position: relative;
    overflow: hidden;
  }
  .deck::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .deck[data-deck="1"]::before {
    background: linear-gradient(90deg, transparent, var(--cyan-glow), transparent);
  }
  .deck[data-deck="2"]::before {
    background: linear-gradient(90deg, transparent, var(--magenta-glow), transparent);
  }

  .deck[data-deck="1"].active {
    border-color: rgba(0, 212, 255, 0.15);
    box-shadow: 0 0 30px rgba(0, 212, 255, 0.06), inset 0 0 30px rgba(0, 212, 255, 0.02);
  }
  .deck[data-deck="1"].active::before { opacity: 1; }
  .deck[data-deck="2"].active {
    border-color: rgba(255, 45, 123, 0.15);
    box-shadow: 0 0 30px rgba(255, 45, 123, 0.06), inset 0 0 30px rgba(255, 45, 123, 0.02);
  }
  .deck[data-deck="2"].active::before { opacity: 1; }

  .deck-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .deck-label {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.6;
    transition: opacity 0.3s;
  }
  .deck.active .deck-label { opacity: 1; }
  .deck[data-deck="1"] .deck-label { color: var(--cyan); }
  .deck[data-deck="2"] .deck-label { color: var(--magenta); }

  .deck-bpm {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    color: var(--text-dim);
    transition: all 0.3s;
  }
  .deck-bpm span {
    color: var(--text);
    font-weight: 700;
  }
  .deck[data-deck="1"].active .deck-bpm {
    background: var(--cyan-dim);
    border-color: rgba(0, 212, 255, 0.15);
    color: rgba(0, 212, 255, 0.6);
  }
  .deck[data-deck="1"].active .deck-bpm span { color: var(--cyan); }
  .deck[data-deck="2"].active .deck-bpm {
    background: var(--magenta-dim);
    border-color: rgba(255, 45, 123, 0.15);
    color: rgba(255, 45, 123, 0.6);
  }
  .deck[data-deck="2"].active .deck-bpm span { color: var(--magenta); }

  .track-name {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    min-height: 24px;
    position: relative;
    transition: color 0.3s;
    letter-spacing: 0.3px;
  }
  .track-name.playing { color: var(--text-bright); }
  .track-name-inner {
    display: inline-block;
    white-space: nowrap;
  }
  .track-name.scrolling .track-name-inner {
    animation: scroll-text 14s linear infinite;
  }
  @keyframes scroll-text {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* Time display */
  .time-display {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }
  .time-current {
    font-size: 40px;
    font-weight: 200;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    letter-spacing: -1px;
    transition: color 0.3s;
  }
  .deck[data-deck="1"] .time-current { color: var(--cyan); }
  .deck[data-deck="2"] .time-current { color: var(--magenta); }

  .time-remaining {
    font-size: 15px;
    font-weight: 400;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    opacity: 0.7;
  }

  /* Waveform */
  .waveform-container {
    position: relative;
    height: 72px;
    background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.2) 100%);
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    border: 1px solid var(--border);
  }
  .waveform-container canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  .waveform-playhead {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 2px;
    background: #fff;
    box-shadow: 0 0 8px rgba(255,255,255,0.6), 0 0 16px rgba(255,255,255,0.2);
    transition: left 0.35s linear;
    z-index: 3;
    pointer-events: none;
  }
  .waveform-playhead::before {
    content: '';
    position: absolute;
    top: -1px;
    left: -3px;
    width: 8px;
    height: 8px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(255,255,255,0.8);
  }
  .waveform-playhead::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: -3px;
    width: 8px;
    height: 8px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(255,255,255,0.8);
  }
  /* Played overlay */
  .waveform-played {
    position: absolute;
    top: 0;
    left: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.35);
    pointer-events: none;
    z-index: 2;
    transition: width 0.35s linear;
  }

  /* Progress bar */
  .progress-wrap {
    height: 3px;
    background: rgba(255,255,255,0.03);
    border-radius: 3px;
    overflow: hidden;
    cursor: pointer;
    margin-top: -4px;
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.35s linear;
    width: 0%;
  }
  .deck[data-deck="1"] .progress-fill {
    background: linear-gradient(90deg, var(--cyan-dark), var(--cyan));
    box-shadow: 0 0 8px var(--cyan-glow);
  }
  .deck[data-deck="2"] .progress-fill {
    background: linear-gradient(90deg, var(--magenta-dark), var(--magenta));
    box-shadow: 0 0 8px var(--magenta-glow);
  }

  /* Deck controls */
  .deck-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: auto;
    padding-top: 4px;
  }

  .btn-play {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03);
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
    position: relative;
  }
  .btn-play::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn-play:hover {
    border-color: rgba(255,255,255,0.2);
    color: var(--text);
    background: rgba(255,255,255,0.05);
    transform: scale(1.05);
  }

  .deck[data-deck="1"] .btn-play.active {
    border-color: var(--cyan);
    color: var(--cyan);
    background: var(--cyan-dim);
    box-shadow: 0 0 20px rgba(0, 212, 255, 0.15), inset 0 0 15px rgba(0, 212, 255, 0.05);
  }
  .deck[data-deck="1"] .btn-play.active::before {
    background: radial-gradient(circle, var(--cyan-glow) 0%, transparent 70%);
    opacity: 0.3;
    animation: btn-pulse 2s ease-in-out infinite;
  }
  .deck[data-deck="2"] .btn-play.active {
    border-color: var(--magenta);
    color: var(--magenta);
    background: var(--magenta-dim);
    box-shadow: 0 0 20px rgba(255, 45, 123, 0.15), inset 0 0 15px rgba(255, 45, 123, 0.05);
  }
  .deck[data-deck="2"] .btn-play.active::before {
    background: radial-gradient(circle, var(--magenta-glow) 0%, transparent 70%);
    opacity: 0.3;
    animation: btn-pulse 2s ease-in-out infinite;
  }

  @keyframes btn-pulse {
    0%, 100% { transform: scale(1); opacity: 0.3; }
    50% { transform: scale(1.3); opacity: 0.1; }
  }

  /* ── Mixer (center) ────────────────────────────────── */
  .mixer {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 20px 8px;
  }

  .crossfader-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 100%;
  }
  .cf-label {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .cf-indicator {
    display: flex;
    gap: 2px;
    width: 100%;
    height: 4px;
  }
  .cf-bar {
    height: 100%;
    border-radius: 2px;
    flex: 1;
    transition: opacity 0.3s ease, box-shadow 0.3s ease;
  }
  .cf-bar.left {
    background: linear-gradient(90deg, var(--cyan), var(--cyan-mid));
    box-shadow: 0 0 6px var(--cyan-glow);
  }
  .cf-bar.right {
    background: linear-gradient(90deg, var(--magenta-mid), var(--magenta));
    box-shadow: 0 0 6px var(--magenta-glow);
  }

  .crossfader-wrap {
    width: 100%;
    position: relative;
    padding: 4px 0;
  }

  /* Transition indicator */
  .transition-indicator {
    text-align: center;
    min-height: 50px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .mix-badge {
    font-size: 8px;
    font-weight: 800;
    letter-spacing: 2px;
    padding: 4px 8px;
    border-radius: 4px;
    background: rgba(123, 47, 247, 0.12);
    color: var(--purple);
    border: 1px solid rgba(123, 47, 247, 0.2);
    opacity: 0;
    transform: scale(0.9);
    transition: all 0.4s ease;
  }
  .mix-badge.active {
    opacity: 1;
    transform: scale(1);
    animation: mix-pulse 1.5s ease-in-out infinite;
    box-shadow: 0 0 16px rgba(123, 47, 247, 0.2);
  }
  @keyframes mix-pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 16px rgba(123, 47, 247, 0.2); }
    50% { opacity: 0.6; box-shadow: 0 0 24px rgba(123, 47, 247, 0.35); }
  }

  .blend-progress {
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.03);
    border-radius: 3px;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .blend-progress.active { opacity: 1; }
  .blend-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--cyan), var(--purple), var(--magenta));
    transition: width 0.5s linear;
    width: 0%;
    border-radius: 3px;
    box-shadow: 0 0 6px var(--purple-glow);
  }

  .blend-time {
    font-size: 9px;
    color: var(--text-muted);
    opacity: 0;
    transition: opacity 0.4s;
  }
  .blend-time.active { opacity: 1; }

  /* ── Sliders ──────────────────────────────────────────── */
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    outline: none;
    cursor: pointer;
    transition: background 0.2s;
  }
  input[type="range"]:hover {
    background: rgba(255,255,255,0.1);
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: linear-gradient(135deg, #aaa, #666);
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }
  input[type="range"]:hover::-webkit-slider-thumb {
    background: linear-gradient(135deg, #ddd, #999);
    transform: scale(1.15);
    box-shadow: 0 0 8px rgba(255,255,255,0.2);
  }

  .crossfader-wrap input[type="range"] {
    height: 6px;
    background: linear-gradient(90deg, var(--cyan-dim), rgba(255,255,255,0.04), var(--magenta-dim));
    border-radius: 6px;
  }
  .crossfader-wrap input[type="range"]::-webkit-slider-thumb {
    width: 22px;
    height: 18px;
    border-radius: 4px;
    background: linear-gradient(180deg, #ddd 0%, #888 100%);
    box-shadow: 0 2px 8px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.3);
  }
  .crossfader-wrap input[type="range"]:hover::-webkit-slider-thumb {
    background: linear-gradient(180deg, #fff 0%, #aaa 100%);
    box-shadow: 0 2px 12px rgba(0,0,0,0.6), 0 0 12px rgba(255,255,255,0.15);
  }

  /* ── Playlist ───────────────────────────────────────── */
  .playlist-area {
    background: linear-gradient(180deg, rgba(14,14,22,0.95) 0%, rgba(10,10,16,0.98) 100%);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    height: 200px;
    display: flex;
    flex-direction: column;
    backdrop-filter: blur(10px);
  }

  .playlist-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .playlist-header h3 {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--text-dim);
  }
  .track-count {
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 500;
  }

  .playlist-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px;
  }

  .track-item {
    display: flex;
    align-items: center;
    padding: 7px 14px;
    border-radius: 6px;
    font-size: 12px;
    color: var(--text-dim);
    cursor: default;
    transition: all 0.2s ease;
    gap: 12px;

<script>
const API = '';

// ── State ──────────────────────────────────────────────
let lastStatus = null;
const WAVEFORM_BARS = 128;
let waveformBuffers = {
  1: new Float32Array(WAVEFORM_BARS).fill(0),
  2: new Float32Array(WAVEFORM_BARS).fill(0)
};
let waveformTargets = { 1: 0, 2: 0 };
let waveformPhase = { 1: 0, 2: 0 };
let animFrameId = null;
let realWaveforms = { 1: null, 2: null };   // real waveform data from engine
let lastTrackNames = { 1: '', 2: '' };      // detect track changes

// ── API ────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method };
  if (body) {
    opts.headers = { 'Content-Type': 'application/json' };
    opts.body = JSON.stringify(body);
  }
  try {
    const res = await fetch(API + path, opts);
    return await res.json();
  } catch { return null; }
}

async function loadTrack(deck, filename) { await api('POST', '/api/load', { deck, track: filename }); }

async function togglePlay(deck) {
  const d = deck === 1 ? lastStatus?.deck1 : lastStatus?.deck2;
  if (d?.playing) await api('POST', '/api/pause', { deck });
  else await api('POST', '/api/play', { deck });
}

async function setCrossfade(pos) { await api('POST', '/api/crossfade', { position: pos }); }

async function fetchWaveform(deckNum) {
  try {
    const res = await fetch(API + '/api/waveform/' + deckNum);
    const data = await res.json();
    if (data.peaks && data.peaks.length > 0) {
      realWaveforms[deckNum] = { peaks: data.peaks, colors: data.colors || [], rms: data.rms || data.waveform || [] };
    } else if (data.waveform && data.waveform.length > 0) {
      // Backward compat: old format was just an array
      realWaveforms[deckNum] = { peaks: data.waveform, colors: [], rms: data.waveform };
    }
  } catch { /* ignore */ }
}
async function setMaster(level) { await api('POST', '/api/master', { level }); }
async function syncBpm(deck) { await api('POST', '/api/sync', { deck }); fetchWaveform(deck); }
async function nudgeBpm(deck, delta) { await api('POST', '/api/nudge_bpm', { deck, delta }); }

async function seekDeck(deck, event) {
  const el = event.target.closest('.waveform-container, .progress-wrap');
  if (!el) return;
  const rect = el.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width));
  const d = deck === 1 ? lastStatus?.deck1 : lastStatus?.deck2;
  if (d) {
    const total = parseTime(d.duration);
    if (total > 0) await api('POST', '/api/seek', { deck, seconds: pct * total });
  }
}

// ── Helpers ────────────────────────────────────────────
function parseTime(str) {
  if (!str || str === '--:--' || str === '0:00') return 0;
  const parts = str.split(':');
  return parseInt(parts[0]) * 60 + parseFloat(parts[1] || 0);
}

// ── Waveform Engine (60fps) ───────────────────────────
function generateWaveformEnergy(deckNum, energy, playing) {
  const buf = waveformBuffers[deckNum];
  const smoothing = 0.92;

  // Shift buffer left by 1
  for (let i = 0; i < buf.length - 1; i++) {
    buf[i] = buf[i + 1];
  }

  let val = 0;
  if (playing) {
    // Create organic-looking waveform using layered sine waves
    waveformPhase[deckNum] += 0.08 + (energy || 0) * 0.04;
    const phase = waveformPhase[deckNum];
    const baseEnergy = (typeof energy === 'number' && energy > 0) ? energy : 0.4;

    // Layer multiple frequencies for organic feel
    val = baseEnergy * (
      0.5 +
      0.25 * Math.sin(phase * 2.1) +
      0.15 * Math.sin(phase * 5.3 + 1.2) +
      0.10 * Math.sin(phase * 11.7 + 2.4) +
      0.08 * Math.sin(phase * 23.1 + 0.7) +
      0.05 * Math.random()
    );
    val = Math.max(0.05, Math.min(1, val));
  }

  // Smooth transition
  buf[buf.length - 1] = buf[buf.length - 2] * 0.3 + val * 0.7;
}

function drawWaveform(deckNum) {
  const canvasId = deckNum === 1 ? 'd1Canvas' : 'd2Canvas';
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;

  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();

  if (canvas.width !== rect.width * dpr || canvas.height !== rect.height * dpr) {
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
  }

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const W = rect.width;
  const H = rect.height;
  ctx.clearRect(0, 0, W, H);

  // Use real waveform data if available, otherwise fall back to live buffer
  const wf = realWaveforms[deckNum];
  const buf = wf || waveformBuffers[deckNum];
  const numBars = wf ? wf.length : buf.length;
  const barW = W / numBars;
  const gap = Math.max(0.5, barW * 0.15);
  const effectiveBarW = barW - gap;

  // Color stops
  const c1 = deckNum === 1 ? [0, 168, 214] : [214, 37, 101];  // darker
  const c2 = deckNum === 1 ? [0, 212, 255] : [255, 45, 123];  // brighter

  // Get playhead position for played/upcoming distinction
  const d = deckNum === 1 ? lastStatus?.deck1 : lastStatus?.deck2;
  const total = d ? parseTime(d.duration) : 0;
  const pos = d ? parseTime(d.position) : 0;
  const playPct = total > 0 ? pos / total : 0;
  const playheadBar = Math.floor(playPct * numBars);

  // Draw center line
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(0, H / 2);
  ctx.lineTo(W, H / 2);
  ctx.stroke();

  for (let i = 0; i < numBars; i++) {
    const v = wf ? wf[i] : buf[i];
    if (v <= 0.01) continue;

    const h = v * H * 0.8;
    const x = i * barW + gap / 2;
    const yTop = (H - h) / 2;

    // Brightness based on position relative to playhead
    const isPast = i < playheadBar;
    const alphaMult = isPast ? 0.3 : (0.6 + v * 0.4);

    // Interpolate color based on value
    const t = v;
    const r = c1[0] + (c2[0] - c1[0]) * t;
    const g = c1[1] + (c2[1] - c1[1]) * t;
    const b = c1[2] + (c2[2] - c1[2]) * t;

    // Create gradient for each bar (top to center to bottom)
    const grad = ctx.createLinearGradient(0, yTop, 0, yTop + h);
    grad.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${alphaMult * 0.5})`);
    grad.addColorStop(0.3, `rgba(${r}, ${g}, ${b}, ${alphaMult})`);
    grad.addColorStop(0.5, `rgba(${r}, ${g}, ${b}, ${alphaMult})`);
    grad.addColorStop(0.7, `rgba(${r}, ${g}, ${b}, ${alphaMult})`);
    grad.addColorStop(1, `rgba(${r}, ${g}, ${b}, ${alphaMult * 0.5})`);

    ctx.fillStyle = grad;

    // Rounded bars
    const radius = Math.min(effectiveBarW / 2, 2);
    ctx.beginPath();
    ctx.moveTo(x + radius, yTop);
    ctx.lineTo(x + effectiveBarW - radius, yTop);
    ctx.quadraticCurveTo(x + effectiveBarW, yTop, x + effectiveBarW, yTop + radius);
    ctx.lineTo(x + effectiveBarW, yTop + h - radius);
    ctx.quadraticCurveTo(x + effectiveBarW, yTop + h, x + effectiveBarW - radius, yTop + h);
    ctx.lineTo(x + radius, yTop + h);
    ctx.quadraticCurveTo(x, yTop + h, x, yTop + h - radius);
    ctx.lineTo(x, yTop + radius);
    ctx.quadraticCurveTo(x, yTop, x + radius, yTop);
    ctx.fill();

    // Glow on high energy upcoming bars
    if (!isPast && v > 0.6) {
      ctx.shadowColor = `rgba(${c2[0]}, ${c2[1]}, ${c2[2]}, ${(v - 0.6) * 0.5})`;
      ctx.shadowBlur = 6;
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }

  // Subtle reflection
  ctx.globalAlpha = 0.04;
  ctx.fillStyle = deckNum === 1 ? 'rgba(0, 212, 255, 1)' : 'rgba(255, 45, 123, 1)';
  ctx.fillRect(0, H * 0.48, W, H * 0.04);
  ctx.globalAlpha = 1;
}

// ── Stacked Waveform View (10s zoomed beat-sync) ──────
function drawStackedWaveform(deckNum) {
  const canvasId = deckNum === 1 ? 'stackedCanvas1' : 'stackedCanvas2';
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;

  const wf = realWaveforms[deckNum];
  if (!wf || wf.length === 0) return;

  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();

  if (canvas.width !== rect.width * dpr || canvas.height !== rect.height * dpr) {
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
  }

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const W = rect.width;
  const H = rect.height;
  ctx.clearRect(0, 0, W, H);

  // Deck state
  const d = deckNum === 1 ? lastStatus?.deck1 : lastStatus?.deck2;
  const totalSec = d ? parseTime(d.duration) : 0;
  const currentSec = d ? parseTime(d.position) : 0;
  if (totalSec <= 0) return;

  // 10-second window centered on playhead
  const windowSec = 10;
  const halfWindow = windowSec / 2;
  const startSec = currentSec - halfWindow;
  const endSec = currentSec + halfWindow;

  // Color
  const c = deckNum === 1 ? [0, 212, 255] : [255, 45, 123];

  // Interpolate waveform data for the visible window
  // Generate ~200 visual bars by sampling from the 500-bin waveform with linear interpolation
  const numVisualBars = 200;
  const gap = 1;
  const barW = W / numVisualBars;
  const effectiveBarW = barW - gap;

  for (let i = 0; i < numVisualBars; i++) {
    // Map bar index to time position
    const t = startSec + (i / numVisualBars) * windowSec;

    // Skip bars outside the track range
    if (t < 0 || t >= totalSec) continue;

    // Map time to waveform bin (fractional) and interpolate
    const binF = (t / totalSec) * wf.length;
    const binLow = Math.floor(binF);
    const binHigh = Math.min(binLow + 1, wf.length - 1);
    const frac = binF - binLow;
    const v = wf[binLow] * (1 - frac) + wf[binHigh] * frac;

    if (v <= 0.005) continue;

    const h = v * H * 0.85;
    const x = i * barW + gap / 2;
    const yTop = (H - h) / 2;

    // Left of center = past (dimmed), right = upcoming (full)
    const isPast = i < numVisualBars / 2;
    const alpha = isPast ? 0.3 : (0.5 + v * 0.45);

    // Gradient: slightly brighter at the top of bars
    const grad = ctx.createLinearGradient(x, yTop, x, yTop + h);
    grad.addColorStop(0, `rgba(${c[0]}, ${c[1]}, ${c[2]}, ${alpha})`);
    grad.addColorStop(1, `rgba(${c[0]}, ${c[1]}, ${c[2]}, ${alpha * 0.6})`);
    ctx.fillStyle = grad;

    // Rounded top bars
    const radius = Math.min(effectiveBarW / 2, 1.5);
    ctx.beginPath();
    ctx.moveTo(x + radius, yTop);
    ctx.lineTo(x + effectiveBarW - radius, yTop);
    ctx.quadraticCurveTo(x + effectiveBarW, yTop, x + effectiveBarW, yTop + radius);
    ctx.lineTo(x + effectiveBarW, yTop + h - radius);
    ctx.quadraticCurveTo(x + effectiveBarW, yTop + h, x + effectiveBarW - radius, yTop + h);
    ctx.lineTo(x + radius, yTop + h);
    ctx.quadraticCurveTo(x, yTop + h, x, yTop + h - radius);
    ctx.lineTo(x, yTop + radius);
    ctx.quadraticCurveTo(x, yTop, x + radius, yTop);
    ctx.closePath();
    ctx.fill();
  }
}

function updateStackedView() {
  const container = document.getElementById('stackedWaveforms');
  const hasA = realWaveforms[1] && realWaveforms[1].length > 0;
  const hasB = realWaveforms[2] && realWaveforms[2].length > 0;

  if (hasA || hasB) {
    container.classList.add('visible');
    // Show/hide rows
    const rowA = container.querySelector('[data-deck="1"]');
    const rowB = container.querySelector('[data-deck="2"]');
    rowA.style.display = hasA ? '' : 'none';
    rowB.style.display = hasB ? '' : 'none';

    if (hasA) drawStackedWaveform(1);
    if (hasB) drawStackedWaveform(2);
  } else {
    container.classList.remove('visible');
  }
}

// ── Animation Loop ────────────────────────────────────
function animate() {
  // Generate new waveform data
  if (lastStatus) {
    const d1 = lastStatus.deck1;
    const d2 = lastStatus.deck2;
    generateWaveformEnergy(1, d1?.energy, d1?.playing);
    generateWaveformEnergy(2, d2?.energy, d2?.playing);
  } else {
    generateWaveformEnergy(1, 0, false);
    generateWaveformEnergy(2, 0, false);
  }

  drawWaveform(1);
  drawWaveform(2);
  updateStackedView();
  animFrameId = requestAnimationFrame(animate);
}

// ── Update UI ─────────────────────────────────────────
function updateUI(data) {
  if (!data) return;
  lastStatus = data;

  // Live badge
  const live = document.getElementById('liveBadge');
  live.className = 'live-badge' + (data.engine !== 'stopped' ? ' on' : '');

  // Master volume
  if (!document.getElementById('masterVol').matches(':active')) {
    document.getElementById('masterVol').value = (data.master_volume || 0.8) * 100;
  }

  // Decks
  updateDeck(1, data.deck1);
  updateDeck(2, data.deck2);

  // Crossfader
  if (!document.getElementById('crossfader').matches(':active')) {
    document.getElementById('crossfader').value = (data.crossfader ?? 0.5) * 100;
  }
  const cf = data.crossfader ?? 0.5;
  document.getElementById('cfLeft').style.opacity = 0.3 + (1 - cf) * 0.7;
  document.getElementById('cfRight').style.opacity = 0.3 + cf * 0.7;

  // Transition detection
  updateTransition(data);

  // Highlight tracks
  highlightPlaylistTracks(data);
}

function updateDeck(num, d) {
  if (!d) return;
  const prefix = num === 1 ? 'd1' : 'd2';

  // Track name
  const trackEl = document.getElementById(prefix + 'Track');
  const innerEl = trackEl.querySelector('.track-name-inner');
  const name = (d.track || '').replace(/\.mp3$/i, '').replace(/_/g, ' ') || 'No Track Loaded';

  // Fetch waveform when track changes
  const trackKey = d.track || '';
  if (trackKey && trackKey !== lastTrackNames[num]) {
    lastTrackNames[num] = trackKey;
    fetchWaveform(num);
  } else if (!trackKey) {
    lastTrackNames[num] = '';
    realWaveforms[num] = null;
  }

  if (innerEl.textContent.replace(/\s{5}.*/, '') !== name) {
    innerEl.textContent = name;
  }
  trackEl.className = 'track-name' + (d.playing ? ' playing' : '');

  // Scrolling
  if (innerEl.scrollWidth > trackEl.clientWidth && d.playing) {
    if (!trackEl.classList.contains('scrolling')) {
      innerEl.textContent = name + '     ' + name + '     ';
      trackEl.classList.add('scrolling');
    }
  } else {
    trackEl.classList.remove('scrolling');
    if (innerEl.textContent !== name) innerEl.textContent = name;
  }

  // BPM — show effective BPM if different from original
  const bpmEl = document.getElementById(prefix + 'Bpm');
  const syncControls = document.getElementById(prefix + 'SyncControls');
  if (d.bpm && d.bpm > 0) {
    const eff = d.effective_bpm && d.effective_bpm > 0 ? d.effective_bpm : d.bpm;
    if (Math.abs(eff - d.bpm) > 0.2) {
      bpmEl.innerHTML = '<span>' + eff.toFixed(1) + '</span> BPM <span style="opacity:0.4;font-size:9px">(' + d.bpm.toFixed(1) + ')</span>';
    } else {
      bpmEl.innerHTML = '<span>' + d.bpm.toFixed(1) + '</span> BPM';
    }
    // Show sync controls when a track is loaded
    if (syncControls) syncControls.style.display = '';
  } else {
    bpmEl.textContent = '';
    if (syncControls) syncControls.style.display = 'none';
  }

  // Time
  document.getElementById(prefix + 'Time').textContent = d.position || '0:00';
  document.getElementById(prefix + 'Remain').textContent = d.remaining ? ('-' + d.remaining) : '-0:00';

  // Progress
  const total = parseTime(d.duration);
  const pos = parseTime(d.position);
  const pct = total > 0 ? (pos / total) * 100 : 0;
  document.getElementById(prefix + 'Progress').style.width = pct + '%';
  document.getElementById(prefix + 'Playhead').style.left = pct + '%';
  document.getElementById(prefix + 'Played').style.width = pct + '%';

  // Play button
  const btn = document.getElementById(prefix + 'PlayBtn');
  btn.className = 'btn-play' + (d.playing ? ' active' : '');
  const icon = document.getElementById(prefix + 'PlayIcon');
  if (d.playing) {
    icon.innerHTML = '<rect x="5" y="4" width="4" height="16" rx="1"/><rect x="13" y="4" width="4" height="16" rx="1"/>';
  } else {
    icon.innerHTML = '<polygon points="7,4 20,12 7,20"/>';
  }

  // Deck active state
  const deckEl = document.getElementById('deck' + num);
  deckEl.className = 'deck' + (d.playing ? ' active' : '');
}

function updateTransition(data) {
  const badge = document.getElementById('mixBadge');
  const progress = document.getElementById('blendProgress');
  const progressFill = document.getElementById('blendProgressFill');
  const timeEl = document.getElementById('blendTime');

  const bothPlaying = data.deck1?.playing && data.deck2?.playing;
  const transitioning = data.transition_active || bothPlaying;

  if (transitioning) {
    badge.className = 'mix-badge active';
    progress.className = 'blend-progress active';
    timeEl.className = 'blend-time mono active';

    if (data.transition_progress !== undefined) {
      progressFill.style.width = (data.transition_progress * 100) + '%';
    } else {
      const cf = data.crossfader ?? 0.5;
      progressFill.style.width = (cf * 100) + '%';
    }

    if (data.transition_elapsed !== undefined && data.transition_duration !== undefined) {
      timeEl.textContent = Math.round(data.transition_elapsed) + 's / ' + Math.round(data.transition_duration) + 's';
    } else {
      timeEl.textContent = '';
    }
  } else {
    badge.className = 'mix-badge';
    progress.className = 'blend-progress';
    timeEl.className = 'blend-time mono';
  }
}

function highlightPlaylistTracks(data) {
  const items = document.querySelectorAll('.track-item');
  const d1Track = data.deck1?.track || '';
  const d2Track = data.deck2?.track || '';

  items.forEach(item => {
    const fn = item.dataset.filename;
    item.classList.remove('on-deck1', 'on-deck2');
    if (fn === d1Track) item.classList.add('on-deck1');
    if (fn === d2Track) item.classList.add('on-deck2');
  });
}

// ── Track List ────────────────────────────────────────
async function loadTrackList() {
  const data = await api('GET', '/api/tracks');
  if (!data?.tracks) return;

  document.getElementById('trackCount').textContent = data.tracks.length + ' tracks';

  const list = document.getElementById('trackList');
  list.innerHTML = data.tracks.map(t => {
    const safeName = t.filename.replace(/'/g, "\\'");
    const displayName = t.name.replace(/_/g, ' ');
    return `<div class="track-item" data-filename="${t.filename}">
      <span class="t-name">${displayName}</span>
      <span class="t-size">${t.size_mb} MB</span>
      <span class="t-actions">
        <button class="load-btn d1" onclick="loadTrack(1, '${safeName}')">DECK A</button>
        <button class="load-btn d2" onclick="loadTrack(2, '${safeName}')">DECK B</button>
      </span>
    </div>`;
  }).join('');
}

// ── Polling ───────────────────────────────────────────
async function poll() {
  const data = await api('GET', '/api/status');
  updateUI(data);
}

// ── Init ──────────────────────────────────────────────
loadTrackList();
setInterval(poll, 400);
poll();
animate();
</script>
</body>
</html>
