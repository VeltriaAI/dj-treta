<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ Treta</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
    height: 100vh;
    overflow: hidden;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 24px;
    background: linear-gradient(180deg, #12121a, #0a0a0f);
    border-bottom: 1px solid #1a1a2e;
  }
  .logo {
    font-size: 20px;
    font-weight: 700;
    background: linear-gradient(135deg, #00d4ff, #7b2ff7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
  }
  .logo span { font-weight: 300; opacity: 0.6; }
  .engine-status {
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 12px;
    background: #1a2a1a;
    color: #4caf50;
    border: 1px solid #2a3a2a;
  }
  .engine-status.stopped { background: #2a1a1a; color: #f44336; border-color: #3a2a2a; }

  /* Main Layout */
  .main {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 0;
    height: calc(100vh - 52px - 180px);
    padding: 16px;
  }

  /* Deck */
  .deck {
    background: #111118;
    border-radius: 12px;
    padding: 20px;
    border: 1px solid #1a1a2e;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .deck.active { border-color: #7b2ff7; box-shadow: 0 0 20px rgba(123, 47, 247, 0.15); }

  .deck-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .deck-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #555;
  }
  .deck-time {
    font-size: 28px;
    font-weight: 300;
    color: #00d4ff;
    font-variant-numeric: tabular-nums;
  }

  .track-name {
    font-size: 13px;
    color: #aaa;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-height: 20px;
  }
  .track-name.playing { color: #fff; }

  /* Progress bar */
  .progress-container {
    height: 40px;
    background: #0a0a12;
    border-radius: 6px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #7b2ff7, #00d4ff);
    transition: width 0.3s linear;
    opacity: 0.6;
  }
  .progress-text {
    position: absolute;
    top: 50%;
    right: 12px;
    transform: translateY(-50%);
    font-size: 11px;
    color: #888;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
  }
  .btn {
    background: #1a1a2e;
    border: 1px solid #2a2a3e;
    color: #ccc;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    transition: all 0.15s;
  }
  .btn:hover { background: #2a2a3e; color: #fff; }
  .btn.play { background: #1a2a1a; border-color: #2a4a2a; color: #4caf50; font-size: 16px; padding: 8px 20px; }
  .btn.play:hover { background: #2a4a2a; }
  .btn.play.active { background: #4caf50; color: #000; }
  .btn.stop { color: #f44336; }

  /* Volume slider */
  .slider-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .slider-group label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #555;
    min-width: 30px;
  }
  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: #1a1a2e;
    border-radius: 2px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #7b2ff7;
    cursor: pointer;
  }

  /* Mixer (center column) */
  .mixer {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 20px 16px;
    min-width: 100px;
  }
  .mixer-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #555;
  }
  .crossfader-container {
    writing-mode: bt-lr;
    height: 200px;
  }
  .crossfader-container input[type="range"] {
    -webkit-appearance: none;
    width: 200px;
    height: 6px;
    transform: rotate(-90deg);
    transform-origin: center;
  }

  /* Playlist / Bottom */
  .bottom {
    padding: 12px 24px;
    background: #0d0d14;
    border-top: 1px solid #1a1a2e;
    display: flex;
    gap: 24px;
    height: 180px;
  }
  .playlist {
    flex: 1;
    overflow-y: auto;
  }
  .playlist-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .playlist-header h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #555;
  }
  .track-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    color: #888;
    transition: all 0.15s;
  }
  .track-item:hover { background: #1a1a2e; color: #fff; }
  .track-item.active { background: #1a1a2e; color: #00d4ff; }
  .track-item .size { color: #444; font-size: 10px; }
  .track-item .load-btns { display: none; gap: 4px; }
  .track-item:hover .load-btns { display: flex; }
  .track-item:hover .size { display: none; }
  .load-btn {
    background: #7b2ff7;
    border: none;
    color: #fff;
    padding: 2px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 10px;
    font-family: inherit;
  }
  .load-btn:hover { background: #9b4fff; }

  .autodj-panel {
    width: 200px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .autodj-panel h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #555;
  }
  .btn.autodj { width: 100%; }
  .btn.autodj.active { background: #7b2ff7; color: #fff; border-color: #9b4fff; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">DJ TRETA <span>// AI DJ Engine</span></div>
  <div class="engine-status" id="engineStatus">connecting...</div>
</div>

<div class="main">
  <!-- Deck 1 -->
  <div class="deck" id="deck1">
    <div class="deck-header">
      <span class="deck-label">Deck 1</span>
      <span class="deck-time" id="deck1Time">--:--</span>
    </div>
    <div class="track-name" id="deck1Track">(empty)</div>
    <div class="progress-container" onclick="seekDeck(1, event)">
      <div class="progress-bar" id="deck1Progress" style="width: 0%"></div>
      <span class="progress-text" id="deck1Remaining">--:--</span>
    </div>
    <div class="controls">
      <button class="btn play" onclick="togglePlay(1)" id="deck1PlayBtn">▶</button>
      <button class="btn stop" onclick="stopDeck(1)">■</button>
    </div>
    <div class="slider-group">
      <label>Vol</label>
      <input type="range" min="0" max="100" value="100" oninput="setVolume(1, this.value/100)" id="deck1Vol">
    </div>
  </div>

  <!-- Mixer -->
  <div class="mixer">
    <span class="mixer-label">D1</span>
    <div class="crossfader-container">
      <input type="range" min="0" max="100" value="50" oninput="setCrossfade(this.value/100)" id="crossfader">
    </div>
    <span class="mixer-label">D2</span>
    <div style="margin-top: 12px;">
      <div class="slider-group">
        <label>Master</label>
        <input type="range" min="0" max="100" value="80" oninput="setMaster(this.value/100)" id="masterVol">
      </div>
    </div>
    <button class="btn" onclick="doTransition()" style="margin-top: 8px; font-size: 10px;">TRANSITION</button>
    <button class="btn" onclick="doDrop()" style="font-size: 10px; color: #f44336;">DROP</button>
  </div>

  <!-- Deck 2 -->
  <div class="deck" id="deck2">
    <div class="deck-header">
      <span class="deck-label">Deck 2</span>
      <span class="deck-time" id="deck2Time">--:--</span>
    </div>
    <div class="track-name" id="deck2Track">(empty)</div>
    <div class="progress-container" onclick="seekDeck(2, event)">
      <div class="progress-bar" id="deck2Progress" style="width: 0%"></div>
      <span class="progress-text" id="deck2Remaining">--:--</span>
    </div>
    <div class="controls">
      <button class="btn play" onclick="togglePlay(2)" id="deck2PlayBtn">▶</button>
      <button class="btn stop" onclick="stopDeck(2)">■</button>
    </div>
    <div class="slider-group">
      <label>Vol</label>
      <input type="range" min="0" max="100" value="100" oninput="setVolume(2, this.value/100)" id="deck2Vol">
    </div>
  </div>
</div>

<!-- Bottom: Playlist + AutoDJ -->
<div class="bottom">
  <div class="playlist">
    <div class="playlist-header">
      <h3>Library</h3>
    </div>
    <div id="trackList"></div>
  </div>
  <div class="autodj-panel">
    <h3>Auto DJ</h3>
    <button class="btn autodj" id="autoDJBtn" onclick="toggleAutoDJ()">Start Auto DJ</button>
    <button class="btn" onclick="skipTrack()">Skip ⏭</button>
    <div id="autoDJStatus" style="font-size: 10px; color: #555; margin-top: 8px;"></div>
  </div>
</div>

<script>
const API = '';  // same origin

// ── API Calls ──────────────────────────────────────────────────────

async function api(method, path, body) {
  const opts = { method };
  if (body) {
    opts.headers = { 'Content-Type': 'application/json' };
    opts.body = JSON.stringify(body);
  }
  try {
    const res = await fetch(API + path, opts);
    return await res.json();
  } catch (e) {
    return null;
  }
}

async function loadTrack(deck, filename) {
  await api('POST', '/api/load', { deck, track: filename });
}

async function togglePlay(deck) {
  const deckData = deck === 1 ? lastStatus?.deck1 : lastStatus?.deck2;
  if (deckData?.playing) {
    await api('POST', '/api/pause', { deck });
  } else {
    await api('POST', '/api/play', { deck });
  }
}

async function stopDeck(deck) {
  await api('POST', '/api/pause', { deck });
}

async function setVolume(deck, level) {
  await api('POST', '/api/volume', { deck, level });
}

async function setCrossfade(pos) {
  await api('POST', '/api/crossfade', { position: pos });
}

async function setMaster(level) {
  await api('POST', '/api/master', { level });
}

async function doTransition() {
  const toDeck = lastStatus?.crossfader < 0.5 ? 2 : 1;
  await api('POST', '/api/transition', { deck: toDeck, duration: 8 });
}

async function doDrop() {
  const toDeck = lastStatus?.crossfader < 0.5 ? 2 : 1;
  await api('POST', '/api/drop', { deck: toDeck });
}

async function seekDeck(deck, event) {
  const rect = event.target.closest('.progress-container').getBoundingClientRect();
  const pct = (event.clientX - rect.left) / rect.width;
  const deckData = deck === 1 ? lastStatus?.deck1 : lastStatus?.deck2;
  if (deckData) {
    const parts = deckData.duration.split(':');
    const totalSec = parseInt(parts[0]) * 60 + parseInt(parts[1]);
    await api('POST', '/api/seek', { deck, seconds: pct * totalSec });
  }
}

async function toggleAutoDJ() {
  if (lastStatus?.auto_dj?.enabled) {
    await api('POST', '/api/autodj/stop');
  } else {
    await api('POST', '/api/autodj/start');
  }
}

async function skipTrack() {
  await api('POST', '/api/autodj/skip');
}

// ── Status Polling ─────────────────────────────────────────────────

let lastStatus = null;

function parseTime(str) {
  if (!str || str === '--:--') return 0;
  const parts = str.split(':');
  return parseInt(parts[0]) * 60 + parseInt(parts[1]);
}

function updateUI(data) {
  if (!data) return;
  lastStatus = data;

  // Engine status
  const statusEl = document.getElementById('engineStatus');
  statusEl.textContent = data.engine;
  statusEl.className = 'engine-status' + (data.engine === 'stopped' ? ' stopped' : '');

  // Deck 1
  const d1 = data.deck1;
  document.getElementById('deck1Time').textContent = d1.position;
  document.getElementById('deck1Track').textContent = d1.track.replace(/\.mp3$/, '');
  document.getElementById('deck1Track').className = 'track-name' + (d1.playing ? ' playing' : '');
  document.getElementById('deck1Remaining').textContent = '-' + d1.remaining;
  document.getElementById('deck1PlayBtn').textContent = d1.playing ? '⏸' : '▶';
  document.getElementById('deck1PlayBtn').className = 'btn play' + (d1.playing ? ' active' : '');
  document.getElementById('deck1').className = 'deck' + (d1.playing ? ' active' : '');

  const d1Total = parseTime(d1.duration);
  const d1Pos = parseTime(d1.position);
  document.getElementById('deck1Progress').style.width = d1Total ? ((d1Pos / d1Total) * 100) + '%' : '0%';

  // Deck 2
  const d2 = data.deck2;
  document.getElementById('deck2Time').textContent = d2.position;
  document.getElementById('deck2Track').textContent = d2.track.replace(/\.mp3$/, '');
  document.getElementById('deck2Track').className = 'track-name' + (d2.playing ? ' playing' : '');
  document.getElementById('deck2Remaining').textContent = '-' + d2.remaining;
  document.getElementById('deck2PlayBtn').textContent = d2.playing ? '⏸' : '▶';
  document.getElementById('deck2PlayBtn').className = 'btn play' + (d2.playing ? ' active' : '');
  document.getElementById('deck2').className = 'deck' + (d2.playing ? ' active' : '');

  const d2Total = parseTime(d2.duration);
  const d2Pos = parseTime(d2.position);
  document.getElementById('deck2Progress').style.width = d2Total ? ((d2Pos / d2Total) * 100) + '%' : '0%';

  // Crossfader (don't update if user is dragging)
  if (!document.getElementById('crossfader').matches(':active')) {
    document.getElementById('crossfader').value = data.crossfader * 100;
  }

  // Auto DJ
  const adj = data.auto_dj;
  const adjBtn = document.getElementById('autoDJBtn');
  adjBtn.textContent = adj.enabled ? 'Stop Auto DJ' : 'Start Auto DJ';
  adjBtn.className = 'btn autodj' + (adj.enabled ? ' active' : '');
  document.getElementById('autoDJStatus').textContent = adj.enabled
    ? `Playing ${adj.current_index + 1}/${adj.playlist_length} — Deck ${adj.active_deck}`
    : `${adj.playlist_length} tracks ready`;
}

async function loadTrackList() {
  const data = await api('GET', '/api/tracks');
  if (!data) return;

  const list = document.getElementById('trackList');
  list.innerHTML = data.tracks.map(t => `
    <div class="track-item">
      <span>${t.name}</span>
      <span class="size">${t.size_mb} MB</span>
      <span class="load-btns">
        <button class="load-btn" onclick="loadTrack(1, '${t.filename.replace(/'/g, "\\'")}')">D1</button>
        <button class="load-btn" onclick="loadTrack(2, '${t.filename.replace(/'/g, "\\'")}')">D2</button>
      </span>
    </div>
  `).join('');
}

// Poll status every 500ms
async function poll() {
  const data = await api('GET', '/api/status');
  updateUI(data);
}

loadTrackList();
setInterval(poll, 500);
poll();
</script>
</body>
</html>
